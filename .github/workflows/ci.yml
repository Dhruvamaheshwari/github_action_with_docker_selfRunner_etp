
name: "github action self Runner"

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    dhruv:
        
        runs-on: self-hosted

        steps:
            
            - name: "check the ci pipe line"
              uses: actions/checkout@v4
            
            - name: "login the docker hub"
              uses: docker/login-action@v3
              with: 
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: "build the docker image"
              run: "docker build -t dhruvamaheshwari47/self_runner_etp:latest  ."

            - name: "push the image on docker hub"
              run: "docker push dhruvamaheshwari47/self_runner_etp:latest"

            - name: "stop the old container"
              run: | 
                docker rm -f self_runner_etp
                
            - name: "re run the new container"
              run: "docker run -d -p 4000:4000 --name self_runner_etp dhruvamaheshwari47/self_runner_etp:latest"
        